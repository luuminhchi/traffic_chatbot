{% load static %}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Luật Giao Thông</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'rag_app/chat.css' %}">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <button class="new-chat-btn" onclick="startNewChat()"><i class="fas fa-plus"></i> New Chat</button>
            
            <div class="chat-history">
                <div class="chat-history-title">Lịch sử</div>
                <div id="historySidebar"></div>
            </div>

            <div class="sidebar-footer"><small>v1.0 - Traffic Law AI và có thể mắc sai sót.</small></div>
        </div>

        <div class="chat-area">
            <div class="chat-header">💬 Trợ lý Luật Giao Thông Việt Nam</div>

            <div class="chat-messages" id="messages">
                <!-- Welcome screen được render bởi chat.js -->
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea class="input-field" id="inputField" placeholder="Nhập câu hỏi..." onkeydown="handleKeyPress(event)"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script src="{% static 'rag_app/chat.js' %}?v=3"></script>
</body>
</html>
