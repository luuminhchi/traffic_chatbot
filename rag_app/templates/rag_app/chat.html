<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Luật Giao Thông</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #10a37f; --text-primary: #0d0d0d; --text-secondary: #565869; --bg-light: #ffffff; --bg-dark: #f7f7f7; --border: #d1d5db; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-light); color: var(--text-primary); overflow: hidden; }
        .container { display: flex; height: 100vh; width: 100vw; }
        .sidebar { width: 260px; background: var(--bg-light); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px; overflow-y: auto; }
        .new-chat-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; margin-bottom: 16px; background: var(--bg-light); color: var(--text-primary); }
        .new-chat-btn:hover { background: var(--bg-dark); }
        .sidebar-footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-secondary); }
        .chat-history { flex: 1; overflow-y: auto; margin: 16px 0; }
        .chat-history-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; }
        .chat-item { padding: 10px; margin-bottom: 8px; border-radius: 6px; background: var(--bg-dark); cursor: pointer; font-size: 13px; color: var(--text-primary); line-height: 1.4; white-space: normal; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; transition: all 0.2s; }
        .chat-item:hover { background: #e8e8e8; }
        .chat-item.active { background: var(--primary); color: white; }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 16px 24px; border-bottom: 1px solid var(--border); font-size: 16px; font-weight: 600; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px 0; display: flex; flex-direction: column; gap: 12px; }
        .message { display: flex; gap: 12px; padding: 0 24px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { justify-content: flex-end; }
        .message.bot { justify-content: flex-start; }
        .message-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
        .bot .message-avatar { background: var(--bg-dark); color: var(--primary); }
        .user .message-avatar { background: var(--primary); color: white; }
        .message-content { max-width: 65%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 15px; word-wrap: break-word; }
        .bot .message-content { background: var(--bg-dark); color: var(--text-primary); }
        .user .message-content { background: var(--primary); color: white; }
        .sources-box { max-width: 65%; margin-left: 44px; padding: 10px 16px; background: #f0fdf4; border-left: 3px solid var(--primary); border-radius: 6px; font-size: 13px; color: #166534; font-style: italic; }
        .loading-spinner { display: flex; gap: 8px; padding: 0 24px; align-items: center; }
        .loading-dots { display: flex; gap: 5px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-secondary); animation: bounce 1.4s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }
        .input-area { padding: 16px 24px 24px; border-top: 1px solid var(--border); }
        .input-wrapper { display: flex; gap: 12px; align-items: flex-end; }
        .input-field { flex: 1; border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; font-size: 15px; font-family: inherit; resize: none; max-height: 100px; min-height: 44px; }
        .input-field:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 1px rgba(16, 163, 127, 0.1); }
        .send-btn { width: 44px; height: 44px; border-radius: 8px; background: var(--primary); border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.2s; flex-shrink: 0; }
        .send-btn:hover:not(:disabled) { background: #0d9368; }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .welcome-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; padding: 24px; text-align: center; }
        .welcome-icon { font-size: 48px; }
        .welcome-title { font-size: 24px; font-weight: 600; }
        .examples { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; max-width: 600px; }
        .example-btn { padding: 16px; border: 1px solid var(--border); border-radius: 12px; background: var(--bg-light); color: var(--text-primary); cursor: pointer; font-size: 14px; line-height: 1.4; transition: all 0.2s; text-align: left; }
        .example-btn:hover { background: var(--bg-dark); border-color: var(--primary); }
        .chat-messages::-webkit-scrollbar { width: 8px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        @media (max-width: 768px) { .sidebar { display: none; } .message-content { max-width: 85%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <button class="new-chat-btn" onclick="startNewChat()"><i class="fas fa-plus"></i> New Chat</button>
            
            <div class="chat-history">
                <div class="chat-history-title">Lịch sử</div>
                <div id="historySidebar"></div>
            </div>

            <div class="sidebar-footer"><small>v1.0 - Traffic Law AI và có thể mắc sai sót.</small></div>
        </div>

        <div class="chat-area">
            <div class="chat-header">💬 Trợ lý Luật Giao Thông Việt Nam</div>

            <div class="chat-messages" id="messages">
                <div style="flex:1; display:flex; align-items:center; justify-content:center;">
                    <div class="welcome-section">
                        <div class="welcome-icon">⚖️</div>
                        <div class="welcome-title">Chào mừng đến với Trợ lý Luật Giao Thông</div>
                        <p style="color: var(--text-secondary); margin-bottom: 20px;">Hỏi bất kỳ câu hỏi nào về luật giao thông, mức phạt, quy định...</p>
                        <div class="examples">
                            <button class="example-btn" onclick="sendQuestion('Lỗi không đội mũ bảo hiểm xe máy bị phạt bao nhiêu?')">🚲 <strong>Mũ bảo hiểm</strong></button>
                            <button class="example-btn" onclick="sendQuestion('Tốc độ tối đa cho xe máy?')">🏁 <strong>Tốc độ</strong></button>
                            <button class="example-btn" onclick="sendQuestion('Phạt bao nhiêu nếu vượt đèn đỏ?')">🚦 <strong>Đèn đỏ</strong></button>
                            <button class="example-btn" onclick="sendQuestion('Tài liệu phải mang theo khi lái xe?')">📋 <strong>Tài liệu</strong></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea class="input-field" id="inputField" placeholder="Nhập câu hỏi..." onkeydown="handleKeyPress(event)"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chatHistory = [], currentChat = [], isLoading = false, currentChatIndex = -1;
        const messagesContainer = document.getElementById('messages');
        const inputField = document.getElementById('inputField');
        const sendBtn = document.getElementById('sendBtn');
        const historySidebar = document.getElementById('historySidebar');

        inputField.addEventListener('input', () => {
            inputField.style.height = 'auto';
            inputField.style.height = Math.min(inputField.scrollHeight, 100) + 'px';
        });

        function updateSidebar() {
            historySidebar.innerHTML = '';
            chatHistory.forEach((item, index) => {
                const chatItem = document.createElement('div');
                chatItem.className = 'chat-item' + (currentChatIndex === index ? ' active' : '');
                chatItem.textContent = item[0].question.substring(0, 60) + (item[0].question.length > 60 ? '...' : '');
                chatItem.onclick = () => loadChatByIndex(index);
                historySidebar.appendChild(chatItem);
            });
        }

        async function loadChatHistory() {
            try {
                const res = await fetch('/api/history/');
                const data = await res.json();
                if (data.success && data.history.length > 0) {
                    // Chuyển format lịch sử từ flat array thành grouped by conversation
                    chatHistory = data.history.map(item => [item]);
                    showWelcome();
                    updateSidebar();
                }
            } catch (err) { console.log('First chat'); showWelcome(); }
        }

        function showWelcome() {
            currentChat = [];
            currentChatIndex = -1;
            messagesContainer.innerHTML = `<div style="flex:1; display:flex; align-items:center; justify-content:center;">
                <div class="welcome-section">
                    <div class="welcome-icon">⚖️</div>
                    <div class="welcome-title">Chào mừng đến với Trợ lý Luật Giao Thông</div>
                    <p style="color: var(--text-secondary); margin-bottom: 20px;">Hỏi bất kỳ câu hỏi nào về luật giao thông, mức phạt, quy định...</p>
                    <div class="examples">
                        <button class="example-btn" onclick="sendQuestion('Lỗi không đội mũ bảo hiểm xe máy bị phạt bao nhiêu?')">🚲 <strong>Mũ bảo hiểm</strong></button>
                        <button class="example-btn" onclick="sendQuestion('Tốc độ tối đa cho xe máy?')">🏁 <strong>Tốc độ</strong></button>
                        <button class="example-btn" onclick="sendQuestion('Phạt bao nhiêu nếu vượt đèn đỏ?')">🚦 <strong>Đèn đỏ</strong></button>
                        <button class="example-btn" onclick="sendQuestion('Tài liệu phải mang theo khi lái xe?')">📋 <strong>Tài liệu</strong></button>
                    </div>
                </div>
            </div>`;
            updateSidebar();
        }

        function displayChatMessages(chatMessages) {
            messagesContainer.innerHTML = '';
            chatMessages.forEach(item => {
                addMessageToUI(item.question, 'user');
                addMessageToUI(item.answer, 'bot', item.sources);
            });
            scrollToBottom();
        }

        function loadChatByIndex(index) {
            if (currentChatIndex === index) return;
            currentChatIndex = index;
            currentChat = chatHistory[index];
            displayChatMessages(currentChat);
            updateSidebar();
        }

        async function sendMessage() {
            const question = inputField.value.trim();
            if (!question) return;

            inputField.value = '';
            inputField.style.height = '44px';

            const welcome = document.querySelector('.welcome-section');
            if (welcome) welcome.parentElement.style.display = 'none';

            addMessageToUI(question, 'user');
            setLoading(true);

            try {
                const res = await fetch('/api/chat/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: question, history: currentChat })
                });

                const data = await res.json();

                if (data.success) {
                    addMessageToUI(data.answer, 'bot', data.sources);
                    
                    // Thêm vào cuộc chat hiện tại
                    currentChat.push({ question, answer: data.answer, sources: data.sources || [] });
                    
                    // Nếu đây là cuộc chat mới, thêm vào lịch sử
                    if (currentChatIndex === -1) {
                        chatHistory.push([...currentChat]);
                        currentChatIndex = chatHistory.length - 1;
                    } else {
                        chatHistory[currentChatIndex] = [...currentChat];
                    }
                    
                    updateSidebar();
                    
                    await fetch('/api/history/save/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ history: currentChat })
                    });
                } else {
                    addMessageToUI('Có lỗi: ' + data.error, 'bot');
                }
            } catch (err) {
                addMessageToUI('Lỗi kết nối: ' + err.message, 'bot');
            } finally {
                setLoading(false);
            }
        }

        function addMessageToUI(text, sender, sources = null) {
            if (isLoading && sender === 'bot') return;

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.innerHTML = sender === 'user' ? '👤' : '⚖️';

            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = text;

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(content);
            messagesContainer.appendChild(msgDiv);

            if (sender === 'bot' && sources && sources.length > 0) {
                const sourceDiv = document.createElement('div');
                sourceDiv.className = 'sources-box';
                sourceDiv.innerHTML = '<strong>📚 Nguồn:</strong> ' + sources.join(', ');
                messagesContainer.appendChild(sourceDiv);
            }

            scrollToBottom();
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function setLoading(state) {
            isLoading = state;
            if (state) {
                const spinner = document.createElement('div');
                spinner.className = 'loading-spinner';
                spinner.id = 'loadingSpinner';
                spinner.innerHTML = `
                    <div class="message-avatar" style="background: var(--bg-dark); color: var(--primary);">⚖️</div>
                    <div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                `;
                messagesContainer.appendChild(spinner);
                scrollToBottom();
            } else {
                const spinner = document.getElementById('loadingSpinner');
                if (spinner) spinner.remove();
            }
            sendBtn.disabled = state;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function sendQuestion(q) {
            inputField.value = q;
            sendMessage();
        }

        function startNewChat() {
            showWelcome();
            updateSidebar();
        }

        window.addEventListener('DOMContentLoaded', loadChatHistory);
    </script>
</body>
</html>
